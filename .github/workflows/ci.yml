name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, Format, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Unit Tests
        run: npm run test:unit

      - name: Build
        run: npm run build
